version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Bundle non-breaking bumps so the inbox doesn't fill up.
      # Majors stay as individual PRs.
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    ignore:
      # TypeScript 7.0 is the native (Go) compiler preview. It is not yet
      # supported by typescript-eslint (typescript-eslint/typescript-eslint#10940)
      # or Next 16.2's built-in TS integration, so the bump breaks lint + build.
      # Stay on 6.x; treat any future TS major as a deliberate manual upgrade.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
